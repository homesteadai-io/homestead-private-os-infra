name: homestead-private-os

services:
  homestead-api:
    build:
      context: ..
      dockerfile: services/homestead-api/Dockerfile
    restart: unless-stopped
    environment:
      HOMESTEAD_ENV: ${HOMESTEAD_ENV:-local}
      HOMESTEAD_REPO_PATH: ${HOMESTEAD_REPO_PATH:-/workspace/keep}
      RECEIPTS_DIR: ${RECEIPTS_DIR:-/data/receipts}
      KEEP_HEALTH_DIR: ${KEEP_HEALTH_DIR:-System Receipts/Homestead Health}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL:-}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-Homestead Private OS}
      MODEL_GATEWAY: ${MODEL_GATEWAY:-direct}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-http://litellm:4000}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_DEFAULT_MODEL: ${LITELLM_DEFAULT_MODEL:-}
      LITELLM_SEND_TEMPERATURE: ${LITELLM_SEND_TEMPERATURE:-false}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_ENVIRONMENT: ${LANGFUSE_ENVIRONMENT:-homestead-private-os}
      LANGFUSE_RELEASE: ${LANGFUSE_RELEASE:-v0-openrouter-route}
      MODEL_ROUTE_RECEIPTS_ENABLED: ${MODEL_ROUTE_RECEIPTS_ENABLED:-false}
      MODEL_ROUTE_RECEIPTS_INCLUDE_CONTENT: ${MODEL_ROUTE_RECEIPTS_INCLUDE_CONTENT:-false}
    volumes:
      - ${KEEP_REPO_HOST_PATH:-../}:/workspace/keep
      - ${HOMESTEAD_DATA_PATH:-../data}:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3

  homestead-mcp:
    build:
      context: ..
      dockerfile: services/homestead-mcp/Dockerfile
    restart: unless-stopped
    environment:
      HOMESTEAD_API_URL: ${HOMESTEAD_API_URL:-http://homestead-api:8000}
    depends_on:
      homestead-api:
        condition: service_healthy

  repo-sync:
    build:
      context: ..
      dockerfile: services/repo-sync/Dockerfile
    restart: unless-stopped
    environment:
      HOMESTEAD_REPO_PATH: ${HOMESTEAD_REPO_PATH:-/workspace/keep}
      REPO_SYNC_INTERVAL_SECONDS: 600
    volumes:
      - ${KEEP_REPO_HOST_PATH:-../}:/workspace/keep
    depends_on:
      homestead-api:
        condition: service_healthy

  receipt-worker:
    build:
      context: ..
      dockerfile: services/receipt-worker/Dockerfile
    restart: unless-stopped
    environment:
      RECEIPTS_DIR: ${RECEIPTS_DIR:-/data/receipts}
      RECEIPT_QUEUE_DIR: /data/receipt-queue
    volumes:
      - ${HOMESTEAD_DATA_PATH:-../data}:/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_BIND:-127.0.0.1}:${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_BIND:-127.0.0.1}:${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - homestead-api
      - homestead-mcp

volumes:
  caddy_data:
  caddy_config:
